<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internet Pulse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #legend {
      position: fixed;
      bottom: 28px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      background: rgba(5, 0, 16, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #legend .legend-title {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 10px;
    }
    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    #legend .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #legend .legend-swatch.triangle {
      border-radius: 0;
      width: 0;
      height: 0;
      background: none !important;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 10px solid currentColor;
    }
    #legend .legend-swatch.diamond {
      border-radius: 0;
      width: 9px;
      height: 9px;
      transform: rotate(45deg);
    }
    #legend .legend-swatch.square {
      border-radius: 0;
      width: 9px;
      height: 9px;
    }
    #legend .legend-swatch.hexagon {
      border-radius: 0;
      width: 11px;
      height: 10px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    #legend .legend-swatch.cross {
      border-radius: 0;
      width: 10px;
      height: 10px;
      clip-path: polygon(35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%);
    }
    #legend .legend-swatch.line {
      border-radius: 0;
      width: 14px;
      height: 2px;
    }
    #legend .legend-swatch.ring {
      background: transparent;
      border: 1.5px solid;
    }
    #legend .legend-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.35);
    }
    #legend .legend-separator {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 8px 0;
    }
    #data-info {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: rgba(255, 255, 255, 0.6);
    }
    #data-info .source {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }
    #data-info .count {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 4px;
    }
    #data-info .timestamp {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
    }
    #event-tooltip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      background: rgba(5, 0, 16, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 8px 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.15s ease;
      max-width: 240px;
    }
    #event-tooltip.visible { opacity: 1; }
    #event-tooltip .tt-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    #event-tooltip .tt-category {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #event-tooltip .tt-detail {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="event-tooltip">
    <div class="tt-name"></div>
    <div class="tt-category"></div>
    <div class="tt-detail"></div>
  </div>
  <div id="data-info">
    <div class="source" id="info-source">Internet Traffic</div>
    <div class="count" id="info-count">20 points</div>
    <div class="timestamp" id="info-timestamp"></div>
  </div>
  <div id="legend">
    <div class="legend-title">NASA EONET Events</div>
    <div class="legend-item">
      <div class="legend-swatch triangle" style="color: #ff2d2d;"></div>
      <span class="legend-label">Volcanoes</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch triangle" style="color: #ff4466;"></div>
      <span class="legend-label">Temp Extremes</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch hexagon" style="background: #4697f7;"></div>
      <span class="legend-label">Severe Storms</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch hexagon" style="background: #88ccff;"></div>
      <span class="legend-label">Sea &amp; Lake Ice</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch diamond" style="background: #ff6b35;"></div>
      <span class="legend-label">Wildfires</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch diamond" style="background: #c9a96e;"></div>
      <span class="legend-label">Dust &amp; Haze</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch square" style="background: #c4956a;"></div>
      <span class="legend-label">Landslides</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch square" style="background: #d4833c;"></div>
      <span class="legend-label">Drought</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch square" style="background: #aa66dd;"></div>
      <span class="legend-label">Manmade</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #00d4aa;"></div>
      <span class="legend-label">Floods</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #44aa88;"></div>
      <span class="legend-label">Water Color</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch cross" style="background: #d4e5ff;"></div>
      <span class="legend-label">Snow</span>
    </div>
    <div class="legend-separator"></div>
    <div class="legend-title" style="margin-top: 2px;">USGS Earthquakes</div>
    <div class="legend-item">
      <div class="legend-swatch ring" style="border-color: #ffcc44; border-width: 2px;"></div>
      <span class="legend-label">Epicenter (M2.5+)</span>
    </div>
    <div class="legend-separator"></div>
    <div class="legend-title" style="margin-top: 2px;">Satellites</div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #ffffff; box-shadow: 0 0 4px #ffffff; border-radius: 0; width: 6px; height: 6px;"></div>
      <span class="legend-label">Starlink Constellation</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch triangle" style="color: #ff6b35;"></div>
      <span class="legend-label">ISS Live Position</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch line" style="background: #ff6b35; box-shadow: 0 0 4px #ff6b35;"></div>
      <span class="legend-label">ISS Orbit Trail</span>
    </div>
    <div class="legend-separator"></div>
    <div class="legend-item">
      <div class="legend-swatch ring" style="border-color: #00ccff;"></div>
      <span class="legend-label">Your Location</span>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
